<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Solutions | Ingeniería Web</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy: #0A0F1E; 
            --turquoise: #00D1D1; 
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--navy);
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* --- Animaciones del Cintillo (Marquee) --- */
        @keyframes marquee-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .animate-marquee-infinite {
            display: flex;
            width: max-content;
            animation: marquee-scroll 35s linear infinite;
        }

        .animate-marquee-infinite:hover {
            animation-play-state: paused;
        }

        /* --- Estilos de la Sección Hero --- */
        .cyber-grid {
            background-image: 
                linear-gradient(to right, rgba(0, 209, 209, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 209, 209, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(circle at center, black, transparent 90%);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(1.5deg); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }

        @keyframes codeRain {
            0% { transform: translateY(-100%); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(100vh); opacity: 0; }
        }
        .code-line {
            position: absolute;
            color: var(--turquoise);
            font-size: 11px;
            white-space: nowrap;
            animation: codeRain linear infinite;
            opacity: 0;
            pointer-events: none;
        }

        /* Efecto de Vidrio (Glassmorphism) */
        .glass {
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 209, 209, 0.15);
        }

        .text-glow {
            text-shadow: 0 0 20px rgba(0, 209, 209, 0.5);
        }

        /* Cursor de escritura */
        .cursor-blink::after {
            content: "";
            display: inline-block;
            width: 12px;
            height: 1.1em;
            background: var(--turquoise);
            margin-left: 8px;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }
        @keyframes blink { from, to { opacity: 1; } 50% { opacity: 0; } }

        /* Efecto de escaneo láser en el Dashboard */
        .scan-line::after {
            content: "";
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, var(--turquoise), transparent);
            animation: scan 4s linear infinite;
            opacity: 0.1;
            pointer-events: none;
        }
        @keyframes scan { 0% { top: -100%; } 100% { top: 100%; } }

        /* Barra de scroll personalizada (opcional para que no sea la fea por defecto) */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--navy);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 209, 209, 0.3);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--turquoise);
        }
</style>
 </head>

<body>

            <!-- BARRA DE NAVEGACIÓN -->
    <nav id="navbar" class="fixed top-0 w-full z-[100] transition-all duration-500 py-8">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <!-- Logo -->
            <div class="flex items-center gap-4 group cursor-pointer">
                <div class="relative">
                    <div class="absolute -inset-1 bg-[#00D1D1] rounded-lg blur opacity-20 group-hover:opacity-60 transition duration-500"></div>
                    <div class="relative h-10 w-10 bg-navy border border-white/10 rounded-lg flex items-center justify-center font-bold text-turquoise overflow-hidden">
                        <img src="logo.svg" class="h-full w-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" alt="Logo DS">
                        <span class="hidden items-center justify-center">DS</span>
                    </div>
                </div>
                <div class="flex flex-col text-left">
                    <span class="text-white font-black text-xl uppercase leading-none">Digital</span>
                    <span class="text-[#00D1D1] font-bold text-[9px] tracking-[0.4em] uppercase opacity-80 leading-none mt-1">Solutions</span>
                </div>
            </div>

            <!-- Menú Escritorio -->
            <div class="hidden lg:flex items-center gap-10">
                <a href="index.html" class="mono text-[10px] font-bold tracking-[0.25em] text-slate-400 hover:text-[#00D1D1] transition-all uppercase whitespace-nowrap">// Home</a>
                <a href="solucionesweb.html" class="mono text-[10px] font-bold tracking-[0.25em] text-slate-400 hover:text-[#00D1D1] transition-all uppercase whitespace-nowrap">// Soluciones Web</a>
                <a href="diseño.html" class="mono text-[10px] font-bold tracking-[0.25em] text-slate-400 hover:text-[#00D1D1] transition-all uppercase whitespace-nowrap">// Diseños</a>
                <a href="casosdeexito.html" class="mono text-[10px] font-bold tracking-[0.25em] text-slate-400 hover:text-[#00D1D1] transition-all uppercase whitespace-nowrap">// Portafolio</a>
                                
                <button class="px-8 py-2.5 rounded-xl border border-[#00D1D1] text-[#00D1D1] mono text-[10px] font-bold uppercase tracking-[0.2em] hover:bg-[#00D1D1] hover:text-[#0A0F1E] transition-all"><a href="casosdeexito.html" <a href="casosdeexito.html">// Portafolio</a></button>
            </div>

            <!-- Botón Menú Móvil -->
            <button id="menu-toggle" class="lg:hidden flex flex-col gap-1.5 z-[150] p-2 focus:outline-none">
                <span class="w-7 h-0.5 bg-[#00D1D1] transition-all duration-300 origin-center" id="bar1"></span>
                <span class="w-7 h-0.5 bg-[#00D1D1] transition-all duration-300" id="bar2"></span>
                <span class="w-7 h-0.5 bg-[#00D1D1] transition-all duration-300 origin-center" id="bar3"></span>
            </button>
        </div>

        <!-- Menú Móvil (Efecto Vidrio Corregido) -->
        <div id="mobile-menu" class="fixed inset-0 glass z-[140] flex flex-col items-center justify-center p-8 transition-all duration-500 translate-x-full opacity-0 lg:hidden pointer-events-none overflow-y-auto h-[100dvh]">
            <div class="flex flex-col items-center gap-8 py-10">
                <a href="#" class="mobile-link mono text-2xl font-bold tracking-[0.3em] text-white hover:text-[#00D1D1] uppercase transition-colors">Home</a>
                <a href="#" class="mobile-link mono text-2xl font-bold tracking-[0.3em] text-white hover:text-[#00D1D1] uppercase transition-colors">Soluciones</a>
                <a href="#" class="mobile-link mono text-2xl font-bold tracking-[0.3em] text-white hover:text-[#00D1D1] uppercase transition-colors">Diseños</a>
                <a href="#" class="mobile-link mono text-2xl font-bold tracking-[0.3em] text-white hover:text-[#00D1D1] uppercase transition-colors">Portafolio</a>
                <button class="mt-4 px-12 py-5 border-2 border-[#00D1D1] text-[#00D1D1] font-bold rounded-2xl uppercase tracking-[0.3em] hover:bg-[#00D1D1] hover:text-[#0A0F1E] transition-all">Contacto</button>
            </div>
        </div>
    </nav>

    <script>
        // 1. Efecto de Escritura Dinámico
        const targetWord = "tu web";
        const typingElement = document.getElementById('typing-text');
        let charIndex = 0;

        function typeEffect() {
            if (charIndex <= targetWord.length) {
                typingElement.textContent = targetWord.slice(0, charIndex);
                charIndex++;
                setTimeout(typeEffect, 150);
            }
        }

        // 2. Lluvia de Código en el Fondo
        const codeRainContainer = document.getElementById('code-rain-container');
        const snippets = [
            "const [dev, setDev] = useState();", 
            "npm run build", 
            "git push origin master", 
            "await fetch(api)", 
            "<div>Digital_Solutions</div>"
        ];

        function initCodeRain() {
            for (let i = 0; i < 25; i++) {
                const line = document.createElement('div');
                line.className = 'code-line mono';
                line.textContent = snippets[Math.floor(Math.random() * snippets.length)];
                line.style.left = Math.random() * 100 + '%';
                line.style.animationDuration = (10 + Math.random() * 15) + 's';
                line.style.animationDelay = (Math.random() * 5) + 's';
                codeRainContainer.appendChild(line);
            }
        }

        // 3. Generación del Cintillo de Tecnologías
        const marqueeContainer = document.getElementById('marquee-container');
        const techs = ["HTML5", "CSS3", "JAVASCRIPT", "REACT.JS", "TAILWIND", "NODE.JS", "TYPESCRIPT", "NEXT.JS", "MONGODB", "FIREBASE"];
        
        function initMarquee() {
            const fullList = [...techs, ...techs];
            fullList.forEach(tech => {
                const item = document.createElement('div');
                item.className = 'flex items-center px-12 md:px-24 whitespace-nowrap';
                item.innerHTML = `
                    <span class="text-white mono text-xl md:text-3xl font-extrabold tracking-tighter opacity-60 hover:opacity-100 hover:text-[#00D1D1] transition-all cursor-default uppercase">${tech}</span>
                    <div class="mx-12 md:mx-24 w-3 h-3 rounded-full bg-[#00D1D1] shadow-[0_0_15px_#00D1D1] opacity-40"></div>
                `;
                marqueeContainer.appendChild(item);
            });
        }

        // 4. Efecto del Navbar al hacer scroll
        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('navbar');
            if (window.scrollY > 20) {
                navbar.classList.add('glass', 'py-4', 'border-b', 'border-[#00D1D1]/20');
                navbar.classList.remove('py-8');
            } else {
                navbar.classList.remove('glass', 'py-4', 'border-b', 'border-[#00D1D1]/20');
                navbar.classList.add('py-8');
            }
        });

        // 5. Lógica del Menú Móvil Mejorada
        const menuToggle = document.getElementById('menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');
        const bar1 = document.getElementById('bar1');
        const bar2 = document.getElementById('bar2');
        const bar3 = document.getElementById('bar3');
        let isMenuOpen = false;

        menuToggle.addEventListener('click', () => {
            isMenuOpen = !isMenuOpen;
            if (isMenuOpen) {
                mobileMenu.classList.remove('translate-x-full', 'opacity-0', 'pointer-events-none');
                mobileMenu.classList.add('translate-x-0', 'opacity-100', 'pointer-events-auto');
                // Animación hamburguesa
                bar1.classList.add('rotate-45', 'translate-y-2');
                bar2.classList.add('opacity-0');
                bar3.classList.add('-rotate-45', '-translate-y-2');
                document.body.style.overflow = 'hidden';
            } else {
                mobileMenu.classList.add('translate-x-full', 'opacity-0', 'pointer-events-none');
                mobileMenu.classList.remove('translate-x-0', 'opacity-100', 'pointer-events-auto');
                // Reset hamburguesa
                bar1.classList.remove('rotate-45', 'translate-y-2');
                bar2.classList.remove('opacity-0');
                bar3.classList.remove('-rotate-45', '-translate-y-2');
                document.body.style.overflow = ''; 
            }
        });

        // Cerrar menú al hacer clic en un enlace
        document.querySelectorAll('.mobile-link').forEach(link => {
            link.addEventListener('click', () => {
                isMenuOpen = false;
                mobileMenu.classList.add('translate-x-full', 'opacity-0', 'pointer-events-none');
                bar1.classList.remove('rotate-45', 'translate-y-2');
                bar2.classList.remove('opacity-0');
                bar3.classList.remove('-rotate-45', '-translate-y-2');
                document.body.style.overflow = '';
            });
        });

        // Carga inicial de funciones
        window.onload = () => {
            typeEffect();
            initCodeRain();
            initMarquee();
        };
    </script>
</body>
</html>
