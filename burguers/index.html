<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurgerPro | Menú Interactivo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { yellow: '#fbbf24', black: '#0a0a0a', surface: '#171717' } },
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .glass-nav { background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(20px); border-b: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: rgba(23, 23, 23, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #cart-scroll-area::-webkit-scrollbar { width: 4px; }
        #cart-scroll-area::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }
        .animate-fade-up { animation: fadeUp 0.5s ease-out forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-brand-black text-white font-sans overflow-x-hidden selection:bg-brand-yellow/30">

    <div id="toast-container" class="fixed bottom-24 left-1/2 -translate-x-1/2 z-[200] flex flex-col gap-2 pointer-events-none"></div>

    <div id="rate-badge" class="fixed bottom-8 left-8 z-[100] glass-card px-4 py-3 rounded-2xl flex items-center gap-3 shadow-2xl">
        <div class="w-8 h-8 bg-emerald-500/20 rounded-lg flex items-center justify-center"><i data-lucide="trending-up" class="text-emerald-400 w-5 h-5"></i></div>
        <div>
            <p class="text-[8px] uppercase font-black text-slate-500 tracking-widest leading-none mb-1">Tasa BCV</p>
            <p id="bcb-rate-val" class="text-white font-black text-sm leading-none">Cargando...</p>
        </div>
    </div>

    <nav class="fixed w-full z-[100] top-0 left-0 glass-nav">
        <div class="max-w-7xl mx-auto px-6 h-16 md:h-20 flex justify-between items-center">
            <a href="#" class="font-display font-black text-xl md:text-2xl uppercase italic tracking-tighter">BURGER<span class="text-brand-yellow">PRO</span></a>
            <button onclick="toggleCart()" class="relative p-3 bg-brand-yellow rounded-2xl transition-transform active:scale-90">
                <i data-lucide="shopping-basket" class="w-6 h-6 text-brand-black"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-brand-black text-[10px] font-black w-6 h-6 flex items-center justify-center rounded-full border-2 border-brand-yellow">0</span>
            </button>
        </div>
    </nav>

    <section class="relative w-full h-[40vh] flex items-center justify-center overflow-hidden pt-16">
        <div class="absolute inset-0 z-0 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=2000');"></div>
        <div class="absolute inset-0 z-1 bg-gradient-to-t from-brand-black via-brand-black/40 to-transparent"></div>
        <h1 class="relative z-10 font-display text-4xl md:text-6xl font-black uppercase italic tracking-tighter text-center px-6">Más que una Hamburguesa.</h1>
    </section>

    <section class="py-12 px-6">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-12">
                <h2 class="font-display text-3xl font-black uppercase italic tracking-tighter">Nuestra <span class="text-brand-yellow">Carta</span></h2>
                <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar w-full md:w-auto">
                    <button onclick="filterMenu('all', this)" class="filter-btn active px-8 py-3 rounded-full bg-brand-yellow text-black font-black text-[10px] uppercase">Todo</button>
                    <button onclick="filterMenu('burger', this)" class="filter-btn px-8 py-3 rounded-full border border-white/10 text-white font-black text-[10px] uppercase">Burgers</button>
                    <button onclick="filterMenu('side', this)" class="filter-btn px-8 py-3 rounded-full border border-white/10 text-white font-black text-[10px] uppercase">Sides</button>
                    <button onclick="filterMenu('drink', this)" class="filter-btn px-8 py-3 rounded-full border border-white/10 text-white font-black text-[10px] uppercase">Bebidas</button>
                </div>
            </div>
            <div id="menu-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </div>
    </section>

    <div id="cart-modal" class="fixed inset-0 z-[110] hidden">
        <div onclick="toggleCart()" class="absolute inset-0 bg-black/95 backdrop-blur-md"></div>
        <div class="absolute right-0 top-0 h-full w-full max-w-md bg-brand-surface shadow-2xl flex flex-col border-l border-white/5">
            
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-brand-black/20">
                <div class="flex items-center gap-4">
                    <h2 class="font-display text-2xl font-black uppercase italic tracking-tighter">Tu Pedido</h2>
                    <button onclick="resetCart()" class="text-red-500 hover:text-white transition-all text-[9px] font-black uppercase flex items-center gap-1"><i data-lucide="trash-2" class="w-3 h-3"></i> Vaciar</button>
                </div>
                <button onclick="toggleCart()" class="p-2 text-slate-500 hover:text-white"><i data-lucide="x"></i></button>
            </div>

            <div id="cart-scroll-area" class="flex-1 overflow-y-auto p-6 space-y-8">
                <div id="cart-items" class="space-y-4"></div>

                <div class="pt-6 border-t border-white/5 space-y-4">
                    <p class="text-[10px] font-black uppercase tracking-widest text-slate-500 italic">3. ¿Tienes un cupón de descuento?</p>
                    <div class="flex gap-2">
                        <input type="text" id="coupon-input" placeholder="INGRESA TU CÓDIGO" class="flex-1 bg-brand-black border border-white/10 rounded-xl px-4 py-3 text-xs uppercase outline-none focus:border-brand-yellow text-white">
                        <button onclick="applyCoupon()" class="px-6 py-3 bg-white text-black font-black text-[10px] uppercase rounded-xl hover:bg-brand-yellow transition-all">Validar</button>
                    </div>
                    <p id="coupon-msg" class="text-[10px] font-black uppercase tracking-widest hidden"></p>
                </div>

                <div class="pt-6 border-t border-white/5">
                    <p class="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-4 italic">4. Opciones de Entrega</p>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="setDelivery(false)" id="btn-pickup" class="delivery-btn active py-3 rounded-xl border-2 border-brand-yellow bg-brand-yellow text-black font-black text-[10px] uppercase">Retiro</button>
                        <button onclick="setDelivery(true)" id="btn-delivery" class="delivery-btn py-3 rounded-xl border-2 border-white/10 text-white font-black text-[10px] uppercase">Delivery (1%)</button>
                    </div>
                    <div id="delivery-fields" class="hidden mt-4 space-y-4 bg-brand-black/40 p-5 rounded-2xl border border-white/5">
                        <input type="text" id="address" placeholder="Dirección Exacta" class="w-full bg-brand-surface border border-white/10 rounded-xl py-3 px-4 text-sm outline-none focus:border-brand-yellow text-white">
                        <input type="text" id="reference" placeholder="Punto de Referencia" class="w-full bg-brand-surface border border-white/10 rounded-xl py-3 px-4 text-sm outline-none focus:border-brand-yellow text-white">
                    </div>
                </div>
            </div>

            <div class="p-8 bg-brand-black border-t border-white/10">
                <div class="flex justify-between items-end mb-1">
                    <p class="text-slate-500 font-bold uppercase text-[9px] tracking-widest">Total USD</p>
                    <p id="cart-total" class="text-4xl font-display font-black text-brand-yellow leading-none">$0.00</p>
                </div>
                <div class="flex justify-between items-center pt-2 border-t border-white/5">
                    <p class="text-[9px] text-emerald-400 font-black uppercase tracking-widest">Monto en Bolívares</p>
                    <p id="cart-total-bs" class="text-xl font-display font-black text-white/90">Bs. 0.00</p>
                </div>
                <button onclick="sendOrder()" class="w-full mt-6 py-5 bg-brand-yellow text-brand-black font-black uppercase tracking-widest rounded-2xl hover:scale-[1.02] transition-all shadow-xl shadow-brand-yellow/10 flex items-center justify-center gap-3">Confirmar Pedido <i data-lucide="send" class="w-4 h-4"></i></button>
            </div>
        </div>
    </div>

    <script>
        let products = [];
        let validCoupons = [];
        let activeDiscount = 0; // 0.10 = 10%
        let cart = [];
        let isDelivery = false;
        let dollarRate = 0;

        // --- 1. CARGAR DATOS DESDE GOOGLE SHEETS ---
        async function loadData() {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = `<div class="col-span-full py-10 text-center text-slate-500 font-black uppercase tracking-widest text-xs">Cargando Menú Interactivo...</div>`;
            
            // Reemplaza con tu URL principal de SheetDB
            const sheetApiUrl = 'https://sheetdb.io/api/v1/q4tstf74k8f5j'; 

            try {
                // Cargar Productos
                const pRes = await fetch(sheetApiUrl);
                const pData = await pRes.json();
                products = pData.map(i => ({ ...i, id: parseInt(i.id), price: parseFloat(i.price), likes: parseInt(i.likes || 0) }));

                // Cargar Cupones
                const cRes = await fetch(`${sheetApiUrl}?sheet=coupons`);
                validCoupons = await cRes.json();

                filterMenu('all', document.querySelector('.filter-btn'));
            } catch (error) {
                grid.innerHTML = `<div class="col-span-full py-10 text-center text-red-500 font-black uppercase text-xs">Error al conectar con la base de datos</div>`;
            }
        }

        // --- 2. GESTIÓN DE LIKES (ESCRITURA) ---
        async function addLike(id, btn) {
            const span = btn.querySelector('span');
            const icon = btn.querySelector('i');
            let current = parseInt(span.innerText);
            
            // Optimistic UI
            span.innerText = current + 1;
            icon.classList.add('fill-red-500', 'text-red-500');
            btn.onclick = null; // Evitar spam de likes

            // Actualizar SheetDB
            const patchUrl = `https://sheetdb.io/api//v1/gh45ydwn5vaiz/${id}`;
            try {
                await fetch(patchUrl, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "likes": current + 1 })
                });
            } catch (e) { console.error("Error al guardar like"); }
        }

        // --- 3. GESTIÓN DE CUPONES ---
        function applyCoupon() {
            const input = document.getElementById('coupon-input').value.toUpperCase();
            const msg = document.getElementById('coupon-msg');
            const coupon = validCoupons.find(c => c.code.toUpperCase() === input);

            if (coupon) {
                activeDiscount = parseFloat(coupon.discount);
                msg.innerText = `CUPÓN VÁLIDO: -${activeDiscount * 100}% DESCUENTO`;
                msg.className = "text-[10px] font-black uppercase tracking-widest text-emerald-400 block";
                showToast("🎟️ Descuento aplicado");
            } else {
                activeDiscount = 0;
                msg.innerText = "CÓDIGO INVÁLIDO O EXPIRADO";
                msg.className = "text-[10px] font-black uppercase tracking-widest text-red-500 block";
            }
            updateUI();
        }

function filterMenu(category, btn) {
    const grid = document.getElementById('menu-grid');
    grid.innerHTML = "";
    
    if(btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.className = "filter-btn px-8 py-3 rounded-full border border-white/10 text-white font-black text-[10px] uppercase");
        btn.className = "filter-btn active px-8 py-3 rounded-full bg-brand-yellow text-black font-black text-[10px] uppercase";
    }

    const filtered = category === 'all' ? products : products.filter(p => p.type === category);
    
    filtered.forEach(p => {
        // --- LÓGICA DE STOCK ---
        const isOutOfStock = parseInt(p.stock) === 0;
        const buttonClass = isOutOfStock 
            ? "bg-slate-800 text-slate-500 cursor-not-allowed" 
            : "bg-white text-black hover:bg-brand-yellow";
        const buttonText = isOutOfStock ? "AGOTADO" : "Añadir";
        const clickAction = isOutOfStock ? "" : `onclick="addToCart(${p.id}, '${p.name}')"`;
        const opacityClass = isOutOfStock ? "opacity-50 grayscale" : "";

        grid.innerHTML += `
            <div class="bg-brand-surface rounded-3xl overflow-hidden border border-white/5 group animate-fade-up ${opacityClass}">
                <div class="h-44 overflow-hidden relative">
                    <img src="${p.img}" class="w-full h-full object-cover transition-all duration-700 group-hover:scale-110">
                    <div class="absolute top-3 right-3 bg-brand-black/90 px-2 py-1 rounded text-brand-yellow font-black text-xs">$${p.price.toFixed(2)}</div>
                    ${isOutOfStock ? '<div class="absolute inset-0 bg-black/60 flex items-center justify-center"><span class="bg-red-600 text-white text-[10px] font-black px-4 py-1 rounded-full uppercase tracking-tighter">No disponible</span></div>' : ''}
                </div>
                <div class="p-5">
                    <h3 class="font-display text-lg font-black uppercase italic leading-none mb-1">${p.name}</h3>
                    <p class="text-slate-500 text-[10px] leading-tight mb-4 h-8 overflow-hidden">${p.desc}</p>
                    <div class="flex justify-between items-center gap-4">
                        <button onclick="addLike(${p.id}, this)" class="flex items-center gap-1.5 group/heart">
                            <i data-lucide="heart" class="w-4 h-4 text-slate-500 group-hover/heart:text-red-500 transition-colors"></i>
                            <span class="text-[10px] font-black text-slate-500">${p.likes || 0}</span>
                        </button>
                        <button ${clickAction} class="flex-1 py-2.5 ${buttonClass} font-black uppercase text-[9px] tracking-widest rounded-xl transition-all">
                            ${buttonText}
                        </button>
                    </div>
                </div>
            </div>`;
    });
    lucide.createIcons();
}

        function addToCart(id, name) {
            const prod = products.find(p => p.id === id);
            const inCart = cart.find(i => i.id === id);
            if (inCart) inCart.qty++; else cart.push({ ...prod, qty: 1, note: "" });
            showToast(`¡${name} añadido!`);
            saveCart();
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            const totalBsEl = document.getElementById('cart-total-bs');
            let subtotal = 0;
            let count = 0;
            list.innerHTML = "";

            cart.forEach(item => {
                subtotal += (item.price * item.qty);
                count += item.qty;
                list.innerHTML += `
                    <div class="bg-brand-black/40 p-4 rounded-2xl border border-white/5 space-y-3">
                        <div class="flex items-center gap-4">
                            <img src="${item.img}" class="w-10 h-10 rounded-lg object-cover">
                            <div class="flex-1">
                                <h4 class="font-bold text-[11px] uppercase italic leading-none mb-1">${item.name}</h4>
                                <p class="text-brand-yellow font-black text-[10px]">$${(item.price * item.qty).toFixed(2)}</p>
                            </div>
                            <div class="flex items-center gap-2 bg-brand-surface p-1 rounded-lg">
                                <button onclick="changeQty(${item.id}, -1)" class="w-5 h-5 flex items-center justify-center text-[10px]">-</button>
                                <span class="text-[10px] font-bold w-4 text-center">${item.qty}</span>
                                <button onclick="changeQty(${item.id}, 1)" class="w-5 h-5 flex items-center justify-center text-[10px]">+</button>
                            </div>
                        </div>
                    </div>`;
            });

            const deliveryFee = isDelivery ? (subtotal * 0.01) : 0;
            const preTotal = subtotal + deliveryFee;
            const discountAmount = preTotal * activeDiscount;
            const finalTotal = preTotal - discountAmount;
            const finalBs = finalTotal * dollarRate;

            document.getElementById('cart-count').innerText = count;
            totalEl.innerText = `$${finalTotal.toFixed(2)}`;
            totalBsEl.innerText = `Bs. ${finalBs.toLocaleString('es-VE', {minimumFractionDigits: 2})}`;
            lucide.createIcons();
        }

        function sendOrder() {
            if (cart.length === 0) return alert("El carrito está vacío.");
            const totalUSD = document.getElementById('cart-total').innerText;
            const totalBs = document.getElementById('cart-total-bs').innerText;
            let text = "NUEVO PEDIDO - BURGERPRO%0A";
            text += "--------------------------------%0A";
            cart.forEach(i => text += `${i.qty}x ${i.name} ($${(i.price * i.qty).toFixed(2)})%0A`);
            text += "--------------------------------%0A";
            text += `ENTREGA: ${isDelivery ? 'Delivery' : 'Retiro'}%0A`;
            if (activeDiscount > 0) text += `DESCUENTO APLICADO: ${activeDiscount * 100}%%0A`;
            text += `TOTAL USD: ${totalUSD}%0A`;
            text += `TOTAL BS: ${totalBs}%0A`;
            text += `TASA (BCB): Bs. ${dollarRate.toFixed(2)}%0A`;
            text += "--------------------------------%0A%0A";
            text += "Adjunto el comprobante de pago a continuación.";
            window.open(`https://wa.me/584124683230?text=${text}`, '_blank');
        }

        async function fetchDollarRate() {
            const res = await fetch('https://ve.dolarapi.com/v1/dolares/oficial');
            const data = await res.json();
            dollarRate = data.promedio;
            document.getElementById('bcb-rate-val').innerText = `Bs. ${dollarRate.toFixed(2)}`;
            updateUI();
        }

        function showToast(t) {
            const c = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = "glass-card text-brand-yellow font-black px-6 py-3 rounded-2xl shadow-2xl text-[10px] uppercase animate-fade-up";
            toast.innerText = t;
            c.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }
        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }
        function saveCart() { localStorage.setItem('proBurger_Cart', JSON.stringify(cart)); }
        function loadCart() { const s = localStorage.getItem('proBurger_Cart'); if(s) { cart = JSON.parse(s); updateUI(); } }
        function changeQty(id, d) { const i = cart.find(x => x.id === id); i.qty += d; if(i.qty <= 0) cart = cart.filter(x => x.id !== id); saveCart(); updateUI(); }
        function setDelivery(v) { isDelivery = v; document.getElementById('delivery-fields').classList.toggle('hidden', !v); document.querySelectorAll('.delivery-btn').forEach(b => b.classList.remove('active', 'bg-brand-yellow', 'text-black')); updateUI(); }
        function resetCart() { if(confirm("¿Vaciar pedido?")) { cart = []; saveCart(); updateUI(); } }

        async function init() { await fetchDollarRate(); loadCart(); await loadData(); }
        init();
    </script>


<a href="https://wa.me/584124683230" target="_blank" class="fixed bottom-8 right-8 z-[100] w-16 h-16 bg-[#25D366] rounded-full flex items-center justify-center shadow-2xl hover:scale-110 transition-transform active:scale-95 group">
    
    <img src="social.png" alt="WhatsApp" class="w-10 h-10 object-contain relative z-10">
    
    <span class="absolute inset-0 rounded-full bg-[#25D366] animate-ping opacity-20 group-hover:opacity-0"></span>
</a>
</body>
</html>
